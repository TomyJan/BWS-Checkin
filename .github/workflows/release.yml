name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build embedded frontend
        shell: bash
        run: |
          set -euo pipefail
          pnpm --dir frontend build
          rm -rf backend/internal/frontend/dist
          mkdir -p backend/internal/frontend/dist
          cp -R frontend/dist/. backend/internal/frontend/dist/

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - name: Build release binaries
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$GITHUB_WORKSPACE/dist" "$GITHUB_WORKSPACE/build"

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/build/bws-checkin-linux-amd64/bws-checkin" \
            ./cmd/server

          tar -C "$GITHUB_WORKSPACE/build/bws-checkin-linux-amd64" \
            -czf "$GITHUB_WORKSPACE/dist/bws-checkin-linux-amd64.tar.gz" \
            bws-checkin

          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/build/bws-checkin-windows-amd64/bws-checkin.exe" \
            ./cmd/server

          (
            cd "$GITHUB_WORKSPACE/build/bws-checkin-windows-amd64"
            zip -9 "$GITHUB_WORKSPACE/dist/bws-checkin-windows-amd64.zip" bws-checkin.exe
          )

          (
            cd "$GITHUB_WORKSPACE/dist"
            sha256sum * > checksums.txt
          )

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --generate-notes
          fi
